<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Orange circle background (Bitcoin style) -->
  <circle cx="32" cy="32" r="30" fill="#FF9500"/>

  <!-- Subtle inner shadow/highlight -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Question mark styled like the Bitcoin ₿ -->
  <!-- Main question mark curve -->
  <path d="M24 22c0-5.5 4-9 9-9 5.5 0 9 3.5 9 8.5 0 4-2.5 6-5.5 7.5-2 1-3 2.2-3 4.5v1.5"
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot -->
  <circle cx="33.5" cy="45" r="2.8" fill="white"/>

  <!-- Vertical serifs (Bitcoin-style bars at top) -->
  <rect x="29" y="8" width="3.5" height="7" rx="1.5" fill="white"/>
  <rect x="36" y="8" width="3.5" height="7" rx="1.5" fill="white"/>

  <!-- Vertical serifs at bottom -->
  <rect x="31.5" y="42" width="3.5" height="7" rx="1.5" fill="white"/>
</svg>
